<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mariana Rossi | Portfolio Jurídico</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Noto+Sans+JP:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #c2a35d; 
            --secondary: #8e733b;
            --bg: #0a0b10;
            --card: rgba(30, 32, 45, 0.9);
            --text: #ffffff;
            --text-dim: #b0b3b8;
        }

        /* --- AJUSTES DE IMPRESSÃO --- */
        @media print {
            @page { margin: 0.5cm; }
            nav, #chat-widget, .lang-btn, .bg-glow, #print-btn { display: none !important; }
            body { background: white !important; color: black !important; padding: 0 !important; }
            .container { margin: 0 !important; padding: 0 !important; max-width: 100% !important; }
            header { margin-bottom: 20px !important; }
            h1 { font-size: 2.2rem !important; margin-bottom: 5px !important; }
            .role-badge { font-size: 0.9rem !important; color: #555 !important; }
            section { margin-bottom: 15px !important; }
            h2 { font-size: 1.3rem !important; margin-bottom: 10px !important; border-bottom: 1px solid #eee; }
            .card { border: 1px solid #ddd !important; background: white !important; margin-bottom: 8px !important; padding: 12px !important; }
            p, div, span { font-size: 0.85rem !important; line-height: 1.2 !important; }
            .contact-grid { grid-template-columns: 1fr 1fr !important; gap: 10px !important; }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .bg-glow {
            position: fixed; left: 0; top: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% -20%, #1a1a2e, transparent);
            z-index: -1;
        }

        nav {
            position: fixed; top: 0; width: 100%;
            background: rgba(10, 11, 16, 0.85);
            backdrop-filter: blur(15px);
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            z-index: 1000; border-bottom: 1px solid rgba(194, 163, 93, 0.2);
        }

        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: var(--text-dim); text-decoration: none; font-weight: 600; font-size: 0.85rem; transition: 0.3s; }
        .nav-links a:hover { color: var(--primary); }

        .lang-btn {
            background: transparent; border: 1px solid rgba(194, 163, 93, 0.4);
            color: white; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 0.7rem;
        }
        .lang-btn.active { background: var(--primary); color: #000; font-weight: bold; }

        .container { max-width: 900px; margin: 140px auto 60px; padding: 0 20px; }

        header { text-align: center; margin-bottom: 60px; }
        h1 { font-size: 3.5rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 10px; }
        .role-badge { font-weight: 700; font-size: 1.1rem; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; }

        section { margin-bottom: 60px; scroll-margin-top: 100px; }
        h2 { font-size: 1.8rem; margin-bottom: 25px; display: flex; align-items: center; gap: 15px; }
        h2::after { content: ''; flex: 1; height: 1px; background: rgba(194, 163, 93, 0.2); }

        .card { background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-radius: 15px; padding: 30px; transition: 0.3s; margin-bottom: 15px; }
        .card:hover { border-color: var(--primary); transform: translateY(-3px); }

        .contact-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .contact-item { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 12px; text-align: center; text-decoration: none; color: white; transition: 0.3s; border: 1px solid transparent; }
        .contact-item:hover { background: rgba(194, 163, 93, 0.1); border-color: var(--primary); }
        .contact-item b { display: block; color: var(--primary); margin-bottom: 5px; font-size: 0.8rem; text-transform: uppercase; }

        #print-btn {
            position: fixed; bottom: 30px; left: 30px; width: 50px; height: 50px;
            background: #222; color: white; border: 1px solid var(--primary);
            border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; transition: 0.3s; z-index: 1000;
        }

        #chat-widget { position: fixed; bottom: 30px; right: 30px; z-index: 2000; display: flex; flex-direction: column; align-items: flex-end; }
        #chat-button { width: 60px; height: 60px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.5rem; box-shadow: 0 8px 20px rgba(194,163,93,0.3); }
        #chat-window { width: 350px; height: 450px; background: #12131a; border: 1px solid rgba(194,163,93,0.3); border-radius: 20px; margin-bottom: 15px; display: none; flex-direction: column; overflow: hidden; }
        #chat-header { background: #1a1b23; padding: 15px; font-weight: 600; color: var(--primary); border-bottom: 1px solid rgba(255,255,255,0.05); }
        #chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; font-size: 0.85rem; }
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; }
        .msg.bot { background: #1f2029; align-self: flex-start; }
        .msg.user { background: var(--primary); color: #000; align-self: flex-end; font-weight: 600; }
        #chat-input-area { padding: 15px; display: flex; gap: 10px; background: #0a0b10; }
        #chat-input { flex: 1; background: #1a1b23; border: 1px solid rgba(194, 163, 93, 0.2); padding: 10px; border-radius: 8px; color: white; outline: none; }
        #chat-send { background: var(--primary); border: none; width: 40px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <button id="print-btn" onclick="window.print()" title="Imprimir Currículo">🖨️</button>

    <nav>
        <div class="nav-links">
            <a href="#about">Sobre</a>
            <a href="#experience">Experiência</a>
            <a href="#education">Formação</a>
            <a href="#contact">Contato</a>
        </div>
        <div>
            <button class="lang-btn active" onclick="updateLang('pt')">PT</button>
            <button class="lang-btn" onclick="updateLang('en')">EN</button>
            <button class="lang-btn" onclick="updateLang('jp')">JP</button>
        </div>
    </nav>

    <div class="container">
        <header>
            <h1>Mariana Elisa Rossi</h1>
            <div id="h-sub" class="role-badge">Cargos...</div>
        </header>

        <section id="about">
            <h2 id="t-about">Objetivo Profissional</h2>
            <div class="card"><p id="d-about"></p></div>
        </section>

        <section id="experience">
            <h2 id="t-exp">Experiência Profissional</h2>
            <div id="e-container"></div>
        </section>

        <section id="education">
            <h2 id="t-edu">Formação Académica</h2>
            <div id="edu-container"></div>
        </section>

        <section id="contact">
            <h2 id="t-contact">Contato</h2>
            <div class="contact-grid" id="c-container"></div>
        </section>
    </div>

    <div id="chat-widget">
        <div id="chat-window">
            <div id="chat-header">ASSISTENTE VIRTUAL DA MARIANA</div>
            <div id="chat-messages"></div>
            <div id="chat-input-area">
                <input type="text" id="chat-input" placeholder="Pergunte algo...">
                <button id="chat-send">></button>
            </div>
        </div>
        <div id="chat-button">⚖️</div>
    </div>

    <script>
        // Função para calcular idade automática
        function getAge(birthDateString) {
            const today = new Date();
            const birthDate = new Date(birthDateString);
            let age = today.getFullYear() - birthDate.getFullYear();
            const m = today.getMonth() - birthDate.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
                age--;
            }
            return age;
        }

        const age = getAge("2005-05-28");

        const profile = {
            pt: {
                role: `${age} Anos`,
                titles: ["Objetivo Profissional", "Experiência Profissional", "Formação Académica", "Contato"],
                about: "Poder ter um crescimento pessoal e profissional, conhecer novas áreas e formas de trabalho, além de auxiliar no crescimento da organização, dispondo de dinamismo e facilidade para trabalhar em equipe.",
                exp: [
                    { company: "Prefeitura de Itatiba", role: "Estágio área jurídica", period: "2024 - 2025", desc: "Suporte jurídico e elaboração de despachos." },
                    { company: "Adega Irmãos Rossi", role: "Controle de caixa", period: "2020 - 2023", desc: "Atendimento ao cliente e gestão financeira." }
                ],
                edu: [
                    { school: "Universidade São Francisco", course: "Direito", period: "2023 - 2027" },
                    { school: "Etec Rosa Perrone Scavone", course: "Ensino Técnico", period: "2020 - 2022" }
                ],
                contact: [
                    { label: "WhatsApp", val: "(11) 99958-1391", link: "https://wa.me/5511999581391" },
                    { label: "E-mail", val: "marianaelisarossi@gmail.com", link: "mailto:marianaelisarossi@gmail.com" }
                ],
                welcome: "Olá! Como posso ajudar você hoje?",
                responses: {
                    prefeitura: "Mariana estagia na Prefeitura de Itatiba, elaborando despachos e auxiliando juridicamente.",
                    direito: "Ela cursa Direito na USF, com formatura em 2027.",
                    adega: "Ela trabalhou 3 anos na Adega Rossi com gestão de caixa."
                }
            },
            en: {
                role: `${age} Years Old`,
                titles: ["Professional Objective", "Experience", "Education", "Contact"],
                about: "Seeking professional growth and teamwork opportunities to contribute to the organization.",
                exp: [
                    { company: "Itatiba City Hall", role: "Legal Intern", period: "2024 - 2025", desc: "Legal support and document drafting." },
                    { company: "Adega Rossi", role: "Cashier", period: "2020 - 2023", desc: "Customer service and financial management." }
                ],
                edu: [
                    { school: "São Francisco University", course: "Bachelor of Laws", period: "2023 - 2027" },
                    { school: "Etec Rosa Perrone Scavone", course: "Technical High School", period: "2020 - 2022" }
                ],
                contact: [
                    { label: "WhatsApp", val: "+55 11 99958-1391", link: "https://wa.me/5511999581391" },
                    { label: "Email", val: "marianaelisarossi@gmail.com", link: "mailto:marianaelisarossi@gmail.com" }
                ],
                welcome: "Hi! How can I help you?",
                responses: {
                    prefeitura: "Mariana is an intern at Itatiba City Hall in the legal department.",
                    direito: "She studies Law at São Francisco University.",
                    adega: "She worked at Adega Rossi for 3 years managing cash flow."
                }
            },
            jp: {
                role: `${age}歳`,
                titles: ["目標", "経験", "学歴", "連絡先"],
                about: "個人的および専門的な成長を追求し、組織に貢献したいと考えています。",
                exp: [
                    { company: "イタチバ市役所", role: "法務インターン", period: "2024 - 2025", desc: "法務サポートと書類作成。" },
                    { company: "Adega Rossi", role: "レジ管理", period: "2020 - 2023", desc: "顧客対応。" }
                ],
                edu: [
                    { school: "サンフランシスコ大学", course: "法学士", period: "2023 - 2027" },
                    { school: "Etec Rosa Perrone Scavone", course: "技術高等教育", period: "2020 - 2022" }
                ],
                contact: [
                    { label: "WhatsApp", val: "+55 11 99958-1391", link: "https://wa.me/5511999581391" },
                    { label: "メール", val: "marianaelisarossi@gmail.com", link: "mailto:marianaelisarossi@gmail.com" }
                ],
                welcome: "こんにちは！何かお手伝いしましょうか？",
                responses: {
                    prefeitura: "マリアナはイタチバ市役所で法務インターンをしています。",
                    direito: "サンフランシスコ大学で法学を学んでいます。",
                    adega: "Adega Rossiで3年間レジ管理をしていました。"
                }
            }
        };

        let lang = 'pt';

        function updateLang(l) {
            lang = l;
            const d = profile[l];
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase() === l));
            
            document.getElementById('h-sub').innerText = d.role;
            document.getElementById('t-about').innerText = d.titles[0];
            document.getElementById('d-about').innerText = d.about;
            document.getElementById('t-exp').innerText = d.titles[1];
            document.getElementById('t-edu').innerText = d.titles[2];
            document.getElementById('t-contact').innerText = d.titles[3];

            document.getElementById('e-container').innerHTML = d.exp.map(e => `
                <div class="card">
                    <h3 style="color:var(--primary)">${e.company}</h3>
                    <div style="font-weight:600; margin:5px 0">${e.role} | <small>${e.period}</small></div>
                    <p style="font-size:0.9rem; color:var(--text-dim)">${e.desc}</p>
                </div>
            `).join('');

            document.getElementById('edu-container').innerHTML = d.edu.map(e => `
                <div class="card" style="margin-bottom:10px; padding:20px;">
                    <h4>${e.course}</h4>
                    <div style="font-size:0.85rem; color:var(--primary)">${e.school} (${e.period})</div>
                </div>
            `).join('');

            document.getElementById('c-container').innerHTML = d.contact.map(c => `
                <a href="${c.link}" class="contact-item" target="_blank">
                    <b>${c.label}</b>
                    ${c.val}
                </a>
            `).join('');

            document.getElementById('chat-messages').innerHTML = `<div class="msg bot">${d.welcome}</div>`;
        }

        const chatWin = document.getElementById('chat-window');
        const chatInput = document.getElementById('chat-input');
        const chatMsgs = document.getElementById('chat-messages');

        document.getElementById('chat-button').onclick = () => chatWin.style.display = chatWin.style.display === 'flex' ? 'none' : 'flex';

        function askAI() {
            const val = chatInput.value.trim().toLowerCase();
            if (!val) return;

            const userDiv = document.createElement('div');
            userDiv.className = 'msg user'; userDiv.innerText = chatInput.value;
            chatMsgs.appendChild(userDiv); chatInput.value = '';

            setTimeout(() => {
                const d = profile[lang];
                let r = "Informação não encontrada. Tente sobre 'Direito' ou 'Estágio'.";
                if (val.includes("prefeitura") || val.includes("estágio")) r = d.responses.prefeitura;
                if (val.includes("direito") || val.includes("usf")) r = d.responses.direito;
                if (val.includes("adega") || val.includes("caixa")) r = d.responses.adega;

                const botDiv = document.createElement('div');
                botDiv.className = 'msg bot'; botDiv.innerText = r;
                chatMsgs.appendChild(botDiv); chatMsgs.scrollTop = chatMsgs.scrollHeight;
            }, 400);
        }

        document.getElementById('chat-send').onclick = askAI;
        chatInput.onkeypress = (e) => { if(e.key === 'Enter') askAI(); };

        document.addEventListener('DOMContentLoaded', () => updateLang('pt'));
    </script>
</body>
</html>
